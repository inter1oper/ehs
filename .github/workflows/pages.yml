name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/meal-menu-web-app-DEXeH
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage site
        run: |
          mkdir _site
          cp index.html styles.css app.js sw.js manifest.webmanifest _site/
          cp icon.svg icon-180.png icon-192.png icon-512.png _site/
          # Disable Jekyll processing on Pages.
          touch _site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
